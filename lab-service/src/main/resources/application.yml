server:
  port: 8087

spring:
  application:
    name: LAB-SERVICE
  datasource:
    url: jdbc:h2:mem:lab_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

