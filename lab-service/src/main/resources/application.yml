server:
  port: 8087

spring:
  application:
    name: LAB-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/lab_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: lab_user
    password: lab_pass
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${HMS_DISCOVERY_HOST:localhost}:8761/eureka/
