server:
  port: 8087

spring:
  application:
    name: LAB-SERVICE
  datasource:
    url: jdbc:mysql://${HMS_DB_HOST:127.0.0.1}:${HMS_DB_PORT:3306}/lab_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${HMS_DB_USER:root}
    password: ${HMS_DB_PASSWORD:root}
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 20000
  jpa:
    hibernate:
      ddl-auto: ${HMS_JPA_DDL_AUTO:none}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
