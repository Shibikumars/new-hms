server:
  port: 8083

spring:
  application:
    name: DOCTOR-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/doctor_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: doctor_user
    password: doctor_pass
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
