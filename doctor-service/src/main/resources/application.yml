server:
  port: 8083

spring:
  application:
    name: DOCTOR-SERVICE

  datasource:
    url: jdbc:mysql://${HMS_DB_HOST:127.0.0.1}:${HMS_DB_PORT:3306}/doctor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${HMS_DB_USER:doctor_user}
    password: ${HMS_DB_PASSWORD:doctor_pass}
  flyway:
    baseline-on-migrate: true
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate # Use validate when Flyway is active
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
