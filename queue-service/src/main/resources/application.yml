server:
  port: 8089

spring:
  application:
    name: QUEUE-SERVICE
  datasource:
    url: jdbc:mysql://${HMS_DB_HOST:localhost}:3306/hms_queue?createDatabaseIfNotExist=true
    username: ${HMS_DB_USER:root}
    password: ${HMS_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
