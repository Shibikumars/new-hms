server:
  port: 8092

spring:
  application:
    name: QUEUE-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/hms_queue?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: queue_user
    password: queue_pass
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: false
    baseline-on-migrate: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${HMS_DISCOVERY_HOST:localhost}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
