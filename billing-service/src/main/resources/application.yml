server:
  port: 8088

spring:
  application:
    name: BILLING-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/billing_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: billing_user
    password: billing_pass
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_SgpkiPWIltBByv}
    secret: ${RAZORPAY_KEY_SECRET:gJTkVgRw0ZmyUV7UESi2i4MM}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
