server:
  port: 8088

spring:
  application:
    name: BILLING-SERVICE

  datasource:
    url: jdbc:h2:mem:billing_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_SgpkiPWIltBByv}
    secret: ${RAZORPAY_KEY_SECRET:gJTkVgRw0ZmyUV7UESi2i4MM}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
