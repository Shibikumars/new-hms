server:
  port: 8086

spring:
  application:
    name: PHARMACY-SERVICE

  datasource:
    url: jdbc:mysql://${HMS_DB_HOST:localhost}:3306/pharmacy_db?useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${HMS_DB_USER:root}
    password: ${HMS_DB_PASSWORD:root}
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${HMS_DISCOVERY_HOST:localhost}:8761/eureka/
