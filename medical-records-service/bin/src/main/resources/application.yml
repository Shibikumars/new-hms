server:
  port: 8085

spring:
  application:
    name: MEDICAL-RECORDS-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/medical_records_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

