server:
  port: 8085

spring:
  application:
    name: MEDICAL-RECORDS-SERVICE

  datasource:
    url: jdbc:h2:mem:medicalrecords_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://${HMS_DISCOVERY_HOST:localhost}:8761/eureka/
