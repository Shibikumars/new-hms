  reporting-service:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /workspace/reporting-service
    volumes:
      - ./:/workspace
    command: mvn spring-boot:run
    ports:
      - "8090:8090"
    depends_on:
      - discovery-service
      - mysql
    networks:
      - hms-net

networks:
  hms-net:
    driver: bridge

volumes:
  mysql_data:
