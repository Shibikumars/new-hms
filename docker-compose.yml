      context: ./doctor-service
    container_name: doctor-service
    environment:
      - HMS_DB_HOST=mysql
      - HMS_DB_USER=doctor_user
      - HMS_DB_PASSWORD=doctor_pass
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - hms-net

  appointment-service:
