version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: hms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms-net

  redis:
    image: redis:7.0-alpine
    container_name: hms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hms-net

  discovery-service:
    build: 
      context: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hms-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      - HMS_JWT_SECRET=${HMS_JWT_SECRET}
      - HMS_REDIS_HOST=redis
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hms-net

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      - HMS_JWT_SECRET=${HMS_JWT_SECRET}
      - HMS_DB_HOST=mysql
      - HMS_DB_USER=auth_user
      - HMS_DB_PASSWORD=auth_pass
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - hms-net

  doctor-service:
    build:
      context: ./doctor-service
    container_name: doctor-service
    environment:
      - HMS_DB_HOST=mysql
      - HMS_DB_USER=doctor_user
      - HMS_DB_PASSWORD=doctor_pass
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - hms-net

  appointment-service:
    build:
      context: ./appointment-service
    container_name: appointment-service
    environment:
      - HMS_DB_HOST=mysql
      - HMS_DB_USER=appointment_user
      - HMS_DB_PASSWORD=appointment_pass
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - hms-net

  billing-service:
    build:
      context: ./billing-service
    container_name: billing-service
    environment:
      - HMS_DB_HOST=mysql
      - HMS_DB_USER=billing_user
      - HMS_DB_PASSWORD=billing_pass
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - hms-net

  patient-service:
    build:
      context: ./patient-service
    container_name: patient-service
    environment:
      - HMS_DB_HOST=mysql
      - HMS_DB_USER=patient_user
      - HMS_DB_PASSWORD=patient_pass
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - hms-net

networks:
  hms-net:
    driver: bridge

volumes:
  mysql_data:
