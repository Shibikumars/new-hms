server:
  port: 8084

spring:
  application:
    name: APPOINTMENT-SERVICE

  datasource:
    url: jdbc:h2:mem:appointment_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        boot:
          allow_jdbc_metadata_access: false

  flyway:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000