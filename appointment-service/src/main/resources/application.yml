server:
  port: 8084

spring:
  application:
    name: APPOINTMENT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/appointment_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ✅ ADD THIS — Feign timeout so it fails fast instead of hanging
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000