server:
  port: 8084

spring:
  application:
    name: APPOINTMENT-SERVICE

  datasource:
    url: jdbc:mysql://${HMS_DB_HOST:127.0.0.1}:${HMS_DB_PORT:3306}/appointment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${HMS_DB_USER:appointment_user}
    password: ${HMS_DB_PASSWORD:appointment_pass}
  flyway:
    baseline-on-migrate: true
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate # Use validate when Flyway is active
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000