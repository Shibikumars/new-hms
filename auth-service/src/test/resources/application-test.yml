spring:
  application:
    name: AUTH-SERVICE-TEST
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: false
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

eureka:
  client:
    enabled: false

hms:
  security:
    jwt:
      secret: testSecretKeyForTesting123456789012345678901234
  auth:
    refresh-token-expiry-seconds: 86400
