server:
  port: 8082

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: auth_user
    password: auth_pass

  h2:
    console:
      enabled: false
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

hms:
  security:
    jwt:
      secret: ${HMS_JWT_SECRET:myDefaultSecretKeyForHMS2024!@#$%^&*()}
  auth:
    refresh-token-expiry-seconds: ${HMS_REFRESH_TOKEN_EXPIRY_SECONDS:604800}