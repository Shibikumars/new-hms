server:
  port: 8082

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:h2:mem:auth_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

hms:
  security:
    jwt:
      secret: ${HMS_JWT_SECRET:myDefaultSecretKeyForHMS2024!@#$%^&*()}
  auth:
    refresh-token-expiry-seconds: ${HMS_REFRESH_TOKEN_EXPIRY_SECONDS:604800}