server:
  port: 8082

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:mysql://${HMS_DB_HOST:127.0.0.1}:${HMS_DB_PORT:3306}/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=5000&socketTimeout=15000&tcpKeepAlive=true
    username: ${HMS_DB_USER:auth_user}
    password: ${HMS_DB_PASSWORD:auth_pass}
  flyway:
    baseline-on-migrate: true
    hikari:
      initializationFailTimeout: -1
      connectionTimeout: 5000
      validationTimeout: 3000
      maximumPoolSize: 8
      minimumIdle: 1
      idleTimeout: 60000
      maxLifetime: 1800000
      keepaliveTime: 30000
      connectionTestQuery: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate # Use validate when Flyway is active
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

hms:
  security:
    jwt:
      secret: ${HMS_JWT_SECRET}
  auth:
    refresh-token-expiry-seconds: ${HMS_REFRESH_TOKEN_EXPIRY_SECONDS:604800}