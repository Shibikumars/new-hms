server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  data:
    redis:
      host: ${HMS_REDIS_HOST:localhost}
      port: ${HMS_REDIS_PORT:6379}

  cloud:
    gateway:

      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
              - Origin
              - Access-Control-Request-Method
              - Access-Control-Request-Headers
            exposedHeaders:
              - Authorization
            allowCredentials: true
      default-filters:
        # If both gateway and downstream service add CORS headers, the browser rejects multiple values.
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      routes:

        - id: auth-login
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/login
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/patients/**
          filters:
            - JwtFilter

        - id: doctor-service
          uri: lb://DOCTOR-SERVICE
          predicates:
            - Path=/doctors/**
          filters:
            - JwtFilter

        - id: appointment-service
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/appointments/**
          filters:
            - JwtFilter

        - id: appointment-slots
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/slots/**
          filters:
            - JwtFilter

        # ✅ NEW LAB SERVICE ROUTE
        - id: lab-service
          uri: lb://LAB-SERVICE
          predicates:
            - Path=/lab/**,/labs/**,/lab-results/**
          filters:
            - JwtFilter

        - id: medical-records-service
          uri: lb://MEDICAL-RECORDS-SERVICE
          predicates:
            - Path=/records/**,/diagnoses/**
          filters:
            - JwtFilter

        - id: pharmacy-service
          uri: lb://PHARMACY-SERVICE
          predicates:
            - Path=/prescriptions/**,/medications/**
          filters:
            - JwtFilter

        - id: billing-service
          uri: lb://BILLING-SERVICE
          predicates:
            - Path=/invoices/**,/payments/**
          filters:
            - JwtFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 6
                key-resolver: "#{@ipKeyResolver}"

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - JwtFilter

        - id: reporting-service
          uri: lb://REPORTING-SERVICE
          predicates:
            - Path=/reporting/**
          filters:
            - JwtFilter

        - id: queue-service
          uri: lb://QUEUE-SERVICE
          predicates:
            - Path=/queue/**
          filters:
            - JwtFilter

        - id: notification-ws
          uri: lb:ws://NOTIFICATION-SERVICE
          predicates:
            - Path=/ws/**

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

hms:
  security:
    jwt:
      secret: ${HMS_JWT_SECRET}