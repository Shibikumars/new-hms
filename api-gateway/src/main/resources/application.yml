server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/patients/**
          filters:
            - JwtFilter

        - id: doctor-service
          uri: lb://DOCTOR-SERVICE
          predicates:
            - Path=/doctors/**
          filters:
            - JwtFilter

        - id: appointment-service
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/appointments/**
          filters:
            - JwtFilter

        - id: appointment-slots
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/slots/**
          filters:
            - JwtFilter

        # ✅ NEW LAB SERVICE ROUTE
        - id: lab-service
          uri: lb://LAB-SERVICE
          predicates:
            - Path=/lab/**
          filters:
            - JwtFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/